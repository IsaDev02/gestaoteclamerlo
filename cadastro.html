<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- MATRÍCULA -->
        <div class="form-card" style="border: 2px solid var(--primary);">
            <div class="section-title text-primary"><i class="fas fa-check-circle me-2"></i> Matrícula no Projeto e Turma</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Projeto</label>
                    <select id="select_projeto" class="form-select" onchange="carregarTurmas(this.value)">
                        <option value="">Escolha o Projeto...</option>
                        <option value="1">Adolescer para Crescer</option>
                        <option value="2">Criança Certeza</option>
                        <option value="3">Sempre Criança</option>
                        <option value="4">Valorizando a Infância</option>
                        <option value="5">Clube de Mães</option>
                        <option value="6">Animar e Celebrar</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Turma</label>
                    <select id="select_turma" class="form-select">
                        <option value="">Selecione a Turma...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data de Cadastro</label>
                    <input type="date" id="data_entrada_projeto" class="form-control">
                </div>
            </div>
        </div>
        
        <script>
            window.onload = () => {
                adicionarLinhaBeneficio();
                initSignaturePad('canvasMae');
                initSignaturePad('canvasPai');
                document.getElementById('data_entrada_projeto').value = new Date().toISOString().split('T')[0];
            };
        </script>
        
        <script>
            function salvarAluno() {
                const dadosAluno = { 
                    projetos: document.getElementById('select_projeto').value,
                    data_entrada_projeto: document.getElementById('data_entrada_projeto').value || null,
                    // other fields...
                };
                // save logic...
            }
        </script>
    </div>
</body>
</html>
