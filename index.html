<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Centro Social Irmã Tecla Merlo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container">
    <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-10 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">Centro Social</h3>
                        <p class="text-muted">Acesse sua conta</p>
                    </div>
                    
                    <!-- Formulário de Login -->
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" id="email" class="form-control" placeholder="admin@escola.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Senha</label>
                            <input type="password" id="password" class="form-control" placeholder="********" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
                    </form>
                    
                    <!-- Div para mostrar mensagens de erro -->
                    <div id="msg" class="alert alert-danger mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Seleciona o formulário e a div de mensagem
    const loginForm = document.getElementById('loginForm');
    const msgDiv = document.getElementById('msg');

    // Event listener para o formulário de login
    loginForm.addEventListener('submit', async (event) => {
        event.preventDefault(); // Evita recarregar a página
        
        msgDiv.classList.add('d-none'); // Esconde mensagens anteriores

        const email = document.getElementById('email').value; // Coleta o email
        const password = document.getElementById('password').value; // Coleta a senha

        try {
            // Faz a requisição para o endpoint de login no back-end
            const response = await fetch('http://localhost:3000/auth/login', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    email: email,
                    senha: password
                }),
            });

            const data = await response.json(); // Converte a resposta para JSON

            if (response.ok) {
                // Login bem-sucedido, salva token e redireciona
                localStorage.setItem('token', data.token); // Salva o token JWT
                localStorage.setItem('role', data.role); // Salva o papel (role) do usuário
                window.location.href = 'dashboard.html'; // Redireciona para o 'dashboard'
            } else {
                // Mostra mensagem de erro em caso de falha
                msgDiv.innerText = data.message || 'Erro ao fazer login.';
                msgDiv.classList.remove('d-none');
            }
        } catch (error) {
            console.error('Erro de rede:', error);
            msgDiv.innerText = 'Erro ao conectar ao servidor. Tente novamente.';
            msgDiv.classList.remove('d-none');
        }
    });
</script>

</body>
</html>
